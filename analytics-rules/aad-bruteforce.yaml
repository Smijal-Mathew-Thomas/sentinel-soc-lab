# Analytics rule as code (Microsoft Sentinel scheduled-rule schema).
# This is the "detection-as-code" version of detections/aad-bruteforce.kql — the same
# logic expressed so it can be reviewed in Git and deployed via API/Bicep/GitHub Actions.
id: 9b1f4e2a-7c3d-4a6b-8e10-0d5f2a9c1b34
name: Entra ID brute-force attempt (10+ failures from one IP)
description: |
  Detects 10 or more failed Entra ID (Azure AD) sign-ins originating from a single
  source IP address within a 10-minute window, which may indicate a brute-force or
  password-spray attack.
severity: Medium
status: Enabled
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
queryFrequency: 15m
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1110
query: |
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where ResultType != 0
  | summarize FailedAttempts = count(),
              TargetedAccounts = dcount(UserPrincipalName)
      by IPAddress, bin(TimeGenerated, 10m)
  | where FailedAttempts >= 10
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: Selected
    groupByEntities:
      - IP
version: 1.0.0
